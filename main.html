<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<from method="post">
		<fieldset>
	<label for="name">Name:*</label>
			<input type="text" id="name" required>
			<br><br>
			<label for="email">Email:*</label>
			<input type="email" id="email" name="name" required>
			<br><br>
			<label for="gender">Gender:*</label>
			<input type="radio" name="gender" value="male" required>
			<label>Male</label>
			<input type="radio" name="gender" value="female" required>
			<label>Female</label>
			<br><br>
			<label for="cars">Car Brands:*</label>
			<select id="cars" name="cars">
				<option value="">one option</option>
				<option value="bmw">BMW</option>
				<option value="audi">Audi</option>
				<option value="mercedez">Mercedez</option>
			</select>
			<br><br>
			<label for="carage">Car Age:*</label>
			<input type="number" id="carage" name="carage" required>
			<br><br>
			<label for="dop">Date of Purchase:*</label>
			<input type="date" id="dop" name="dop" required>
			<br><br>
			<label for="password">Password:*</label>
			<input type="password" id="password" name="password" required>
		    <br><br>
			<button type="submit">Submit</button>
		</fieldset>
	</from>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
